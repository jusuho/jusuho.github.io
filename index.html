<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jusuho</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4efe6;
        --fg: #16221f;
        --accent: #c4572e;
        --panel: rgba(255, 252, 247, 0.84);
        --border: rgba(22, 34, 31, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        color: var(--fg);
        background:
          radial-gradient(circle at top left, rgba(196, 87, 46, 0.18), transparent 30%),
          radial-gradient(circle at bottom right, rgba(22, 34, 31, 0.12), transparent 35%),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
        padding: 48px 32px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 24px 60px rgba(22, 34, 31, 0.08);
      }

      p {
        margin: 0 0 16px;
        line-height: 1.7;
        font-size: 1.05rem;
      }

      .eyebrow {
        margin-bottom: 12px;
        color: var(--accent);
        letter-spacing: 0.12em;
        font-size: 0.82rem;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 20px;
        font-size: clamp(2.8rem, 8vw, 4.8rem);
        line-height: 0.95;
      }

      .links {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 28px;
      }

      a {
        color: inherit;
        text-decoration: none;
        border-bottom: 1px solid currentColor;
        padding-bottom: 2px;
      }

      .button {
        border: none;
        border-radius: 999px;
        background: var(--fg);
        color: #fffaf2;
        padding: 12px 18px;
        transition: transform 160ms ease, opacity 160ms ease;
      }

      .button:hover,
      .button:focus-visible {
        transform: translateY(-1px);
        opacity: 0.92;
      }

      @media (max-width: 640px) {
        main {
          padding: 36px 22px;
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Portfolio in Progress</p>
      <h1>jusuho</h1>
      <p>這是我的個人網站，接下來會放上作品、經歷與聯絡方式。</p>
      <p>目前先用這個頁面完成 GitHub Pages 部署，之後可以再逐步擴充成正式的面試用網站。</p>
      <div class="links">
        <a class="button" href="https://github.com/jusuho">GitHub</a>
        <a href="mailto:you@example.com">Email</a>
      </div>
    </main>
  </body>
</html>
